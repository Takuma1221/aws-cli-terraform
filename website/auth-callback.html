<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン処理中</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(160deg, #eef2ff 0%, #f8fafc 55%, #e0f2fe 100%);
      color: #111827;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(255,255,255,.92);
      border-radius: 18px;
      box-shadow: 0 12px 40px rgba(15, 23, 42, .10);
      padding: 32px;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 14px;
    }

    p {
      line-height: 1.7;
      color: #4b5563;
    }

    #status {
      margin-top: 18px;
      color: #1d4ed8;
      white-space: pre-line;
    }

    .actions {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      border-radius: 10px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      font-size: .95rem;
    }

    .btn-primary {
      background: #111827;
      color: #fff;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <main class="card">
    <h1>ログイン処理中</h1>
    <p>Cognito から返ってきた認可コードを token に交換しています。完了すると TODO 画面へ戻ります。</p>
    <p id="status">設定を読み込んでいます...</p>
    <div class="actions hidden" id="actions">
      <a id="back-link" class="btn btn-primary" href="/">TODO 画面へ戻る</a>
      <button id="retry-btn" class="btn btn-secondary" type="button">トップに戻る</button>
    </div>
  </main>

  <script>
    const STORAGE_KEY = 'todo-cognito-session';
    const PKCE_VERIFIER_KEY = 'todo-pkce-verifier';
    const OAUTH_STATE_KEY = 'todo-oauth-state';

    let authConfig = null;

    async function init() {
      document.getElementById('retry-btn').addEventListener('click', () => {
        window.location.href = '/';
      });

      try {
        const config = await fetch('/api-config.json').then(r => r.json());
        authConfig = {
          clientId: config.cognitoClientId,
          hostedUiUrl: config.cognitoHostedUiUrl,
          callbackUrls: config.cognitoCallbackUrls || [],
        };

        await completeLogin();
      } catch (_) {
        showResult('設定ファイルの読み込みに失敗しました。terraform apply 済みか確認してください。', false);
      }
    }

    async function completeLogin() {
      const url = new URL(window.location.href);
      const code = url.searchParams.get('code');
      const state = url.searchParams.get('state');
      const error = url.searchParams.get('error');
      const errorDescription = url.searchParams.get('error_description');

      if (error) {
        clearOAuthState();
        showResult(`ログインに失敗しました。\n${errorDescription || error}`, false);
        return;
      }

      if (!code) {
        clearOAuthState();
        showResult('認可コードが見つかりません。トップ画面からログインをやり直してください。', false);
        return;
      }

      const expectedState = sessionStorage.getItem(OAUTH_STATE_KEY);
      const verifier = sessionStorage.getItem(PKCE_VERIFIER_KEY);

      if (!expectedState || !verifier || state !== expectedState) {
        clearOAuthState();
        showResult('state 検証に失敗しました。ログインをやり直してください。', false);
        return;
      }

      const redirectUri = selectConfiguredUrl(authConfig.callbackUrls);
      if (!redirectUri) {
        clearOAuthState();
        showResult('callback_urls が未設定です。terraform.tfvars を確認してください。', false);
        return;
      }

      try {
        const response = await fetch(`${authConfig.hostedUiUrl}/oauth2/token`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({
            grant_type: 'authorization_code',
            client_id: authConfig.clientId,
            code,
            redirect_uri: redirectUri,
            code_verifier: verifier,
          }),
        });

        if (!response.ok) {
          throw new Error('token exchange failed');
        }

        const tokenSet = await response.json();
        saveSession(tokenSet);
        clearOAuthState();
        showResult('ログインに成功しました。TODO 画面へ戻ります。', true);

        setTimeout(() => {
          window.location.href = '/';
        }, 1500);
      } catch (_) {
        clearOAuthState();
        showResult('Cognito から token を取得できませんでした。callback URL を確認してください。', false);
      }
    }

    function saveSession(tokenSet) {
      const idPayload = parseJwt(tokenSet.id_token);
      const accessPayload = parseJwt(tokenSet.access_token);
      const previousSession = readStoredSession() || {};

      const session = {
        accessToken: tokenSet.access_token,
        idToken: tokenSet.id_token || previousSession.idToken || null,
        refreshToken: tokenSet.refresh_token || previousSession.refreshToken || null,
        expiresAt: Date.now() + ((tokenSet.expires_in || 3600) * 1000),
        email: idPayload.email || accessPayload.username || previousSession.email || 'ログイン済みユーザー',
        name: idPayload.name || previousSession.name || '',
      };

      localStorage.setItem(STORAGE_KEY, JSON.stringify(session));
    }

    function readStoredSession() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;

      try {
        const parsed = JSON.parse(raw);
        const normalizedEmail = String(parsed.email || '').trim();
        const normalizedName = String(parsed.name || '').trim();

        if (!normalizedName || normalizedName === normalizedEmail) {
          parsed.name = '';
        }

        if (parsed.name !== normalizedName) {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(parsed));
        }

        return parsed;
      } catch (_) {
        localStorage.removeItem(STORAGE_KEY);
        return null;
      }
    }

    function clearOAuthState() {
      sessionStorage.removeItem(PKCE_VERIFIER_KEY);
      sessionStorage.removeItem(OAUTH_STATE_KEY);
    }

    function selectConfiguredUrl(urls) {
      if (!Array.isArray(urls) || !urls.length) {
        return null;
      }

      const sameOriginUrl = urls.find(url => {
        try {
          return new URL(url).origin === window.location.origin;
        } catch (_) {
          return false;
        }
      });

      return sameOriginUrl || urls[0];
    }

    function parseJwt(token) {
      if (!token) return {};

      const [, payload] = token.split('.');
      if (!payload) return {};

      const normalized = payload.replace(/-/g, '+').replace(/_/g, '/');
      const padded = normalized.padEnd(Math.ceil(normalized.length / 4) * 4, '=');
      return JSON.parse(decodeURIComponent(atob(padded).split('').map(char => {
        return `%${char.charCodeAt(0).toString(16).padStart(2, '0')}`;
      }).join('')));
    }

    function showResult(message, success) {
      document.getElementById('status').textContent = message;
      document.getElementById('status').style.color = success ? '#15803d' : '#b91c1c';
      document.getElementById('actions').classList.remove('hidden');
    }

    init();
  </script>
</body>
</html>
