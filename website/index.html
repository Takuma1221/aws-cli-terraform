<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO アプリ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    #app {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,.08);
      padding: 32px;
      width: 100%;
      max-width: 560px;
      height: fit-content;
    }

    h1 {
      font-size: 1.5rem;
      color: #1a1a2e;
      margin-bottom: 24px;
    }

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
    }

    .app-title p {
      margin-top: 8px;
      color: #6b7280;
      font-size: .92rem;
      line-height: 1.5;
    }

    #auth-panel {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      min-width: 160px;
    }

    #auth-status {
      font-size: .9rem;
      color: #374151;
      text-align: right;
      line-height: 1.4;
      white-space: pre-line;
    }

    .auth-btn {
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: .95rem;
      cursor: pointer;
      transition: opacity .2s;
    }

    .auth-btn:hover { opacity: .9; }

    #login-btn {
      background: #111827;
      color: #fff;
    }

    #logout-btn {
      background: #f3f4f6;
      color: #111827;
    }

    .hidden { display: none !important; }

    #login-hint {
      margin-bottom: 20px;
      padding: 14px 16px;
      border-radius: 10px;
      background: #eef2ff;
      color: #3730a3;
      font-size: .92rem;
      line-height: 1.6;
    }

    #add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    #new-todo {
      flex: 1;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }
    #new-todo:focus { border-color: #4f46e5; }

    #add-btn {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      transition: background .2s;
    }
    #add-btn:hover { background: #4338ca; }
    #add-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    #todo-list { list-style: none; }

    #todo-list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    #todo-list li:last-child { border-bottom: none; }

    .todo-title {
      flex: 1;
      font-size: 1rem;
      color: #374151;
      word-break: break-all;
    }

    .delete-btn {
      background: none;
      border: 1.5px solid #e5e7eb;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: .85rem;
      color: #6b7280;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .delete-btn:hover { border-color: #ef4444; color: #ef4444; }

    .empty { color: #9ca3af; font-size: .95rem; padding: 16px 0 !important; }
    .empty, .loading { border-bottom: none !important; }

    #status {
      margin-top: 16px;
      font-size: .85rem;
      color: #ef4444;
      min-height: 1.2em;
    }

    @media (max-width: 640px) {
      #app {
        padding: 24px 20px;
      }

      .app-header {
        flex-direction: column;
      }

      #auth-panel {
        width: 100%;
        align-items: stretch;
      }

      #auth-status {
        text-align: left;
      }

      #add-form {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-header">
      <div class="app-title">
        <h1>TODO リスト</h1>
        <p>Cognito Hosted UI でログインし、ブラウザ側でトークンを保持する Phase 2 実装です。</p>
      </div>
      <div id="auth-panel">
        <p id="auth-status">認証状態を確認しています...</p>
        <button id="login-btn" class="auth-btn hidden">ログイン</button>
        <button id="logout-btn" class="auth-btn hidden">ログアウト</button>
      </div>
    </div>
    <p id="login-hint" class="hidden">TODO を操作するにはログインしてください。Phase 3 で API Gateway 側の JWT 検証も追加します。</p>
    <div id="add-form">
      <input id="new-todo" type="text" placeholder="新しい TODO を入力..." maxlength="200" />
      <button id="add-btn">追加</button>
    </div>
    <ul id="todo-list">
      <li class="loading">読み込み中...</li>
    </ul>
    <p id="status"></p>
  </div>

  <script>
    // --------------------------------------------------------
    // Terraform が生成する /api-config.json を読み込み、API と Cognito の
    // 接続先をブラウザに注入します。
    // --------------------------------------------------------
    const STORAGE_KEY = 'todo-cognito-session';
    const PKCE_VERIFIER_KEY = 'todo-pkce-verifier';
    const OAUTH_STATE_KEY = 'todo-oauth-state';

    let API_URL = '';
    let authConfig = null;
    let session = null;

    async function init() {
      try {
        const config = await fetch('/api-config.json').then(r => r.json());
        API_URL = config.apiUrl;
        authConfig = {
          clientId: config.cognitoClientId,
          hostedUiUrl: config.cognitoHostedUiUrl,
          callbackUrls: config.cognitoCallbackUrls || [window.location.origin],
          logoutUrls: config.cognitoLogoutUrls || [window.location.origin],
        };

        bindAuthButtons();
        await restoreSession();
        updateAuthUI();

        if (session) {
          await loadTodos();
        } else {
          render([]);
        }
      } catch (_) {
        showError('設定ファイルの読み込みに失敗しました。Terraform が正常に apply されているか確認してください。');
        document.getElementById('auth-status').textContent = '設定ファイルの読み込みに失敗しました';
      }
    }

    function bindAuthButtons() {
      document.getElementById('login-btn').addEventListener('click', login);
      document.getElementById('logout-btn').addEventListener('click', logout);
    }

    async function login() {
      clearError();

      const redirectUri = selectConfiguredUrl(authConfig.callbackUrls);
      if (!redirectUri) {
        showError('callback_urls が設定されていません。terraform.tfvars を確認してください。');
        return;
      }

      const state = randomString();
      const verifier = randomString(64);
      const challenge = await sha256Base64Url(verifier);

      sessionStorage.setItem(PKCE_VERIFIER_KEY, verifier);
      sessionStorage.setItem(OAUTH_STATE_KEY, state);

      const params = new URLSearchParams({
        client_id: authConfig.clientId,
        response_type: 'code',
        scope: 'openid email profile',
        redirect_uri: redirectUri,
        state,
        code_challenge_method: 'S256',
        code_challenge: challenge,
      });

      window.location.href = `${authConfig.hostedUiUrl}/login?${params.toString()}`;
    }

    async function restoreSession() {
      const stored = readStoredSession();
      if (!stored) {
        session = null;
        return;
      }

      if (!isExpired(stored.expiresAt)) {
        session = stored;
        return;
      }

      if (!stored.refreshToken) {
        clearStoredSession();
        session = null;
        return;
      }

      try {
        const refreshed = await refreshSession(stored.refreshToken);
        saveSession({ ...refreshed, refresh_token: stored.refreshToken });
      } catch (_) {
        clearStoredSession();
        session = null;
      }
    }

    async function refreshSession(refreshToken) {
      const response = await fetch(`${authConfig.hostedUiUrl}/oauth2/token`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          grant_type: 'refresh_token',
          client_id: authConfig.clientId,
          refresh_token: refreshToken,
        }),
      });

      if (!response.ok) {
        throw new Error('refresh failed');
      }

      return response.json();
    }

    function saveSession(tokenSet) {
      const previousSession = readStoredSession() || {};
      const idPayload = parseJwt(tokenSet.id_token);
      const accessPayload = parseJwt(tokenSet.access_token);

      session = {
        accessToken: tokenSet.access_token,
        idToken: tokenSet.id_token || previousSession.idToken || null,
        refreshToken: tokenSet.refresh_token || previousSession.refreshToken || null,
        expiresAt: Date.now() + ((tokenSet.expires_in || 3600) * 1000),
        email: idPayload.email || accessPayload.username || previousSession.email || 'ログイン済みユーザー',
        name: idPayload.name || previousSession.name || '',
      };

      localStorage.setItem(STORAGE_KEY, JSON.stringify(session));
      updateAuthUI();
    }

    function readStoredSession() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        return null;
      }

      try {
        const parsed = JSON.parse(raw);
        const normalizedEmail = String(parsed.email || '').trim();
        const normalizedName = String(parsed.name || '').trim();

        if (!normalizedName || normalizedName === normalizedEmail) {
          parsed.name = '';
        }

        if (parsed.name !== normalizedName) {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(parsed));
        }

        return parsed;
      } catch (_) {
        localStorage.removeItem(STORAGE_KEY);
        return null;
      }
    }

    function clearStoredSession() {
      localStorage.removeItem(STORAGE_KEY);
    }

    async function logout() {
      clearStoredSession();
      session = null;
      updateAuthUI();
      render([]);

      const logoutUri = selectConfiguredUrl(authConfig.logoutUrls);
      if (!logoutUri) {
        showError('logout_urls が設定されていません。terraform.tfvars を確認してください。');
        return;
      }

      const params = new URLSearchParams({
        client_id: authConfig.clientId,
        logout_uri: logoutUri,
      });

      window.location.href = `${authConfig.hostedUiUrl}/logout?${params.toString()}`;
    }

    function updateAuthUI() {
      const authStatus = document.getElementById('auth-status');
      const loginBtn = document.getElementById('login-btn');
      const logoutBtn = document.getElementById('logout-btn');
      const loginHint = document.getElementById('login-hint');
      const addForm = document.getElementById('add-form');

      if (session) {
        authStatus.textContent = formatAuthStatus(session);
        loginBtn.classList.add('hidden');
        logoutBtn.classList.remove('hidden');
        loginHint.classList.add('hidden');
        addForm.classList.remove('hidden');
        return;
      }

      authStatus.textContent = '未ログイン';
      loginBtn.classList.remove('hidden');
      logoutBtn.classList.add('hidden');
      loginHint.classList.remove('hidden');
      addForm.classList.add('hidden');
    }

    function formatAuthStatus(currentSession) {
      const name = (currentSession.name || '').trim();
      const email = (currentSession.email || '').trim();
      const normalizedName = name.toLowerCase();
      const normalizedEmail = email.toLowerCase();

      if (name && email && normalizedName !== normalizedEmail && !normalizedName.includes('@')) {
        return `${name}\n${email}`;
      }

      return email || name || 'ログイン済み';
    }

    // ---- TODO 一覧の取得 ------------------------------------------------
    async function loadTodos() {
      try {
        const res = await apiFetch('/todos');
        if (!res.ok) throw new Error(res.statusText);
        const todos = await res.json();
        render(todos);
      } catch (_) {
        showError('TODO の取得に失敗しました。');
      }
    }

    // ---- 一覧の描画 -----------------------------------------------------
    function render(todos) {
      const list = document.getElementById('todo-list');
      if (!session) {
        list.innerHTML = '<li class="empty">ログインすると TODO を表示できます</li>';
        return;
      }

      if (!todos.length) {
        list.innerHTML = '<li class="empty">まだ TODO はありません</li>';
        return;
      }
      list.innerHTML = todos.map(t => `
        <li>
          <span class="todo-title">${escapeHtml(t.title)}</span>
          <button class="delete-btn" data-id="${escapeAttr(t.id)}">削除</button>
        </li>
      `).join('');

      list.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => deleteTodo(btn.dataset.id));
      });
    }

    // ---- TODO の追加 ----------------------------------------------------
    document.getElementById('add-btn').addEventListener('click', async () => {
      const input = document.getElementById('new-todo');
      const title = input.value.trim();
      if (!title) return;

      const btn = document.getElementById('add-btn');
      btn.disabled = true;
      clearError();

      try {
        const res = await apiFetch('/todos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title }),
        });
        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.error || res.statusText);
        }
        input.value = '';
        await loadTodos();
      } catch (e) {
        showError(`追加に失敗しました: ${e.message}`);
      } finally {
        btn.disabled = false;
      }
    });

    // Enter キーでも送信
    document.getElementById('new-todo').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('add-btn').click();
    });

    // ---- TODO の削除 ----------------------------------------------------
    async function deleteTodo(id) {
      clearError();
      try {
        const res = await apiFetch(`/todos/${encodeURIComponent(id)}`, {
          method: 'DELETE',
        });
        if (!res.ok) throw new Error(res.statusText);
        await loadTodos();
      } catch (_) {
        showError('削除に失敗しました。');
      }
    }

    async function apiFetch(path, options = {}) {
      if (!session) {
        throw new Error('not authenticated');
      }

      const headers = new Headers(options.headers || {});
      headers.set('Authorization', `Bearer ${session.accessToken}`);

      return fetch(`${API_URL}${path}`, {
        ...options,
        headers,
      });
    }

    // ---- ユーティリティ -------------------------------------------------
    function selectConfiguredUrl(urls) {
      if (!Array.isArray(urls) || !urls.length) {
        return null;
      }

      const sameOriginUrl = urls.find(url => {
        try {
          return new URL(url).origin === window.location.origin;
        } catch (_) {
          return false;
        }
      });

      return sameOriginUrl || urls[0];
    }

    function isExpired(expiresAt) {
      return !expiresAt || Date.now() >= expiresAt - 30000;
    }

    function parseJwt(token) {
      if (!token) {
        return {};
      }

      const [, payload] = token.split('.');
      if (!payload) {
        return {};
      }

      const normalized = payload.replace(/-/g, '+').replace(/_/g, '/');
      const padded = normalized.padEnd(Math.ceil(normalized.length / 4) * 4, '=');
      return JSON.parse(decodeURIComponent(atob(padded).split('').map(char => {
        return `%${char.charCodeAt(0).toString(16).padStart(2, '0')}`;
      }).join('')));
    }

    function randomString(length = 48) {
      const bytes = new Uint8Array(length);
      crypto.getRandomValues(bytes);
      return Array.from(bytes, byte => byte.toString(16).padStart(2, '0')).join('').slice(0, length);
    }

    async function sha256Base64Url(value) {
      const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(value));
      const bytes = Array.from(new Uint8Array(digest));
      return btoa(String.fromCharCode(...bytes))
        .replace(/\+/g, '-')
        .replace(/\//g, '_')
        .replace(/=+$/g, '');
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function escapeAttr(str) {
      return String(str).replace(/"/g, '&quot;');
    }

    function showError(msg) {
      document.getElementById('status').textContent = msg;
    }

    function clearError() {
      document.getElementById('status').textContent = '';
    }

    init();
  </script>
</body>
</html>
