<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログアウト完了</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(150deg, #fff7ed 0%, #ffffff 50%, #ecfeff 100%);
      color: #111827;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(255,255,255,.94);
      border-radius: 18px;
      box-shadow: 0 12px 36px rgba(15, 23, 42, .08);
      padding: 32px;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 14px;
    }

    p {
      line-height: 1.7;
      color: #4b5563;
      margin-bottom: 20px;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      border-radius: 10px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      font-size: .95rem;
    }

    .btn-primary {
      background: #111827;
      color: #fff;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>ログアウトしました</h1>
    <p>Cognito Hosted UI からのログアウトが完了しました。必要なら TODO アプリへ戻って再度ログインできます。</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">TODO 画面へ戻る</a>
      <a class="btn btn-secondary" href="/">もう一度ログインする</a>
    </div>
  </main>
</body>
</html>
